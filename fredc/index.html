<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fred C - IEC Route Sheet</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .loading-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
        }
        h1 {
            color: #333;
            margin: 0 0 10px 0;
            font-size: 24px;
        }
        .driver-name {
            color: #667eea;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .date-info {
            color: #666;
            font-size: 14px;
            margin-top: 15px;
        }
        .error-message {
            color: #e74c3c;
            background: #ffe6e6;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        .manual-link {
            display: none;
            margin-top: 20px;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <h1>IEC Supply LLC</h1>
        <div class="driver-name">Fred C - Sales Rep Route</div>
        <div class="spinner"></div>
        <p>Loading today's route sheet...</p>
        <div class="date-info" id="date-info"></div>
        <div class="error-message" id="error-message">
            Route sheet not found for today. Please contact dispatch.
        </div>
        <a href="#" class="manual-link" id="manual-link">Try Manual Access</a>
    </div>

    <script>
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        const dateStr = `${year}-${month}-${day}`;
        
        document.getElementById('date-info').textContent = `Date: ${month}/${day}/${year}`;
        
        const routeUrl = `https://klahviciec.github.io/route-sheets/sales-rep-routes/fredc/${dateStr}.html`;
        
        async function checkAndRedirect() {
            try {
                const response = await fetch(routeUrl, { method: 'HEAD' });
                
                if (response.ok) {
                    window.location.href = routeUrl;
                } else {
                    showError();
                }
            } catch (error) {
                setTimeout(() => {
                    window.location.href = routeUrl;
                }, 1500);
            }
        }
        
        function showError() {
            document.querySelector('.spinner').style.display = 'none';
            document.querySelector('p').textContent = 'Route not available';
            document.getElementById('error-message').style.display = 'block';
            document.getElementById('manual-link').style.display = 'inline-block';
            document.getElementById('manual-link').href = routeUrl;
        }
        
        checkAndRedirect();
    </script>
</body>
</html>
